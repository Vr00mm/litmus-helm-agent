apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-admin
  labels:
    {{- include "litmus-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litmus-admin-hardcodedshit
  labels:
    {{- include "litmus-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "litmus-agent.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: litmus-admin
    namespace: {{ .Release.Namespace }}
